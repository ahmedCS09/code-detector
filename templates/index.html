<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Automated Code Review</title>
  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.png') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <h1 style="text-align: center;" class="mb-4">Automated Code Review System</h1>
    <form id="reviewForm">
      <div class="mb-3">
        <textarea placeholder="Enter your Python code here:" class="form-control" id="code" rows="12" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Review Code</button>
    </form>

    <div class="mt-4">
      <h4>Review Results:</h4>
      <ul id="results" class="list-group"></ul>
    </div>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
